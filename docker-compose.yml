services:
  buscador_alertas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buscador_alertas
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TARGET_POSTAL_CODE: ${TARGET_POSTAL_CODE}
      MAX_DISTANCE_KM: ${MAX_DISTANCE_KM}
      MAX_RESULTS: ${MAX_RESULTS}
      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS}
      TZ: Europe/Madrid
    volumes:
      - buscador_coches_data:/app/data
    command: ["/app/bootstrap.sh", "/app/entrypoint.sh"]

  buscador_bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buscador_bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TARGET_POSTAL_CODE: ${TARGET_POSTAL_CODE}
      MAX_DISTANCE_KM: ${MAX_DISTANCE_KM}
      MAX_RESULTS: ${MAX_RESULTS}
      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS}
      TZ: Europe/Madrid
    volumes:
      - buscador_coches_data:/app/data
    command: ["/app/bootstrap.sh", "python", "/app/telegram_bot_service.py"]

volumes:
  buscador_coches_data:
