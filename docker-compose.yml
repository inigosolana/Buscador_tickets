services:
  buscador_alertas:
    image: ghcr.io/inigosolana/buscador_tickets:latest
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TARGET_POSTAL_CODE: ${TARGET_POSTAL_CODE}
      MAX_DISTANCE_KM: ${MAX_DISTANCE_KM}
      MAX_RESULTS: ${MAX_RESULTS}
      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS}
      TZ: Europe/Madrid
    volumes:
      - buscador_coches_data:/app/data
    command: ["/app/bootstrap.sh", "/app/entrypoint.sh"]
    deploy:
      restart_policy:
        condition: any

  buscador_bot:
    image: ghcr.io/inigosolana/buscador_tickets:latest
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TARGET_POSTAL_CODE: ${TARGET_POSTAL_CODE}
      MAX_DISTANCE_KM: ${MAX_DISTANCE_KM}
      MAX_RESULTS: ${MAX_RESULTS}
      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS}
      TZ: Europe/Madrid
    volumes:
      - buscador_coches_data:/app/data
    command: ["/app/bootstrap.sh", "python", "/app/telegram_bot_service.py"]
    deploy:
      restart_policy:
        condition: any

volumes:
  buscador_coches_data:
